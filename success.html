<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="报名成功">
  <title>报名成功 | Newdelearn</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="success-page">
  <div class="page-wrapper">
    <main class="success-main">
      <div class="success-container">
        <div class="success-card">
          <div class="success-icon-wrap">
            <div class="success-circle">
              <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
          </div>

          <h1 class="success-title">报名成功！</h1>
          <p class="success-subtitle">
            感谢您的报名，我们已收到您的信息
          </p>

          <div class="success-info">
            <div class="info-item">
              <span class="info-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </span>
              <div class="info-content">
                <span class="info-label">确认邮件</span>
                <span class="info-text">已发送至您的邮箱</span>
              </div>
            </div>
            <div class="info-item">
              <span class="info-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </span>
              <div class="info-content">
                <span class="info-label">咨询热线</span>
                <span class="info-text">400-888-8888</span>
              </div>
            </div>
          </div>

          <div class="success-actions">
            <a href="/" class="btn btn-primary">
              返回首页
            </a>
            <button class="btn btn-secondary" onclick="shareEvent()">
              分享活动
            </button>
          </div>

          <p class="success-tip">
            如有疑问，请联系我们：
            <a href="mailto:support@newdelearn.com" class="text-link">support@newdelearn.com</a>
          </p>
        </div>
      </div>
    </main>
  </div>

  <script>
    function shareEvent() {
      if (navigator.share) {
        navigator.share({
          title: 'Newdelearn AI实战课程',
          text: '我刚刚报名了 Newdelearn AI实战课程，快来一起学习吧！',
          url: window.location.origin
        }).catch(() => {});
      } else {
        const url = window.location.origin;
        navigator.clipboard.writeText(url).then(() => {
          const btn = event.target;
          const originalText = btn.textContent;
          btn.textContent = '链接已复制！';
          setTimeout(() => {
            btn.textContent = originalText;
          }, 2000);
        });
      }
    }
  </script>
</body>
</html>
